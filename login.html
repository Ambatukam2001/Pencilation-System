<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portrait Drawing System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-card {
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.25);
        }
        .form-transition {
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="bg-[#FDFBF7] min-h-screen flex items-center justify-center p-4 md:p-8">
    
    <div class="max-w-6xl w-full bg-white flex flex-col md:flex-row overflow-hidden auth-card min-h-[700px]">
        <!-- Left Side: Inspo / Logo -->
        <div class="md:w-1/2 bg-[#1A1A1A] p-12 text-white flex flex-col justify-between relative overflow-hidden">
             <!-- Decorative Pencil Element -->
             <div class="absolute -right-20 -top-20 opacity-10 transform rotate-12">
                 <i data-lucide="pencil" class="w-96 h-96"></i>
             </div>
             
             <div class="relative z-10">
                <a href="index.html" class="flex items-center space-x-2 text-2xl font-display font-black tracking-widest hover:text-[#C16053] transition-colors">
                    <span class="text-[#C16053]">●</span>
                    <span>DRAWD</span>
                </a>
             </div>

             <div class="relative z-10 space-y-6">
                <h2 class="text-6xl font-black uppercase leading-none">Capture Your<br>Essence.</h2>
                <p class="text-white/60 text-lg max-w-sm">Join our community of art lovers and bespoke portrait collectors. Book, track, and chat with the artist in real-time.</p>
                <div class="pt-8 flex items-center space-x-4">
                    <div class="flex -space-x-4">
                        <img src="https://i.pravatar.cc/100?img=1" class="w-12 h-12 rounded-full border-4 border-[#1A1A1A]">
                        <img src="https://i.pravatar.cc/100?img=2" class="w-12 h-12 rounded-full border-4 border-[#1A1A1A]">
                        <img src="https://i.pravatar.cc/100?img=3" class="w-12 h-12 rounded-full border-4 border-[#1A1A1A]">
                    </div>
                    <p class="text-sm font-bold tracking-widest text-[#C16053] uppercase">500+ Verified Clients</p>
                </div>
             </div>

             <div class="relative z-10 text-[10px] uppercase font-bold tracking-[0.4em] text-white/40">
                © 2024 DRAWD PORTRAIT SYSTEM
             </div>
        </div>

        <!-- Right Side: Forms -->
        <div class="md:w-1/2 p-12 md:p-20 flex flex-col justify-center bg-white relative">
            
            <!-- Admin Login Form -->
            <div id="login-container" class="form-transition">
                <div class="mb-12">
                    <h3 class="text-4xl font-black mb-2 font-display">ADMIN PORTAL</h3>
                    <p class="text-gray-400 font-medium">Authorized artist access only.</p>
                </div>

                <form id="login-form" class="space-y-6">
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase tracking-widest font-black text-gray-500">Email Address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-0 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input type="email" id="login-email" required class="w-full border-b border-gray-200 py-3 pl-8 focus:border-[#C16053] outline-none transition-all placeholder:text-gray-200" placeholder="admin@drawd.com">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase tracking-widest font-black text-gray-500">Password</label>
                        <div class="relative">
                             <i data-lucide="lock" class="absolute left-0 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                             <input type="password" id="login-password" required class="w-full border-b border-gray-200 py-3 pl-8 focus:border-[#C16053] outline-none transition-all placeholder:text-gray-200" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-[#1A1A1A] text-white py-5 font-black uppercase tracking-widest text-sm hover:bg-[#C16053] transition-all transform hover:-translate-y-1 rounded shadow-xl">
                        Authorize Entry
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
